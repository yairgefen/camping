<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קמפינג היורשים</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f4f0; color: #1a1a1a; direction: rtl; }
    .app { max-width: 640px; margin: 0 auto; padding: 0 16px 60px; }
    .header { padding: 1.25rem 0 1rem; border-bottom: 1px solid #e0ddd6; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; color: #666; margin-top: 3px; }
    .edit-btn { padding: 6px 14px; border-radius: 999px; border: 1px solid #ccc; font-size: 13px; cursor: pointer; background: #fff; color: #444; white-space: nowrap; }
    .edit-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1rem; }
    .stat { background: #fff; border-radius: 8px; border: 1px solid #e0ddd6; padding: 10px 12px; text-align: center; }
    .stat-num { font-size: 20px; font-weight: 600; }
    .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
    .tabs-wrapper { display: flex; align-items: center; border-bottom: 1px solid #e0ddd6; margin-bottom: 1rem; overflow-x: auto; gap: 2px; padding-bottom: 0; }
    .tab { padding: 8px 13px; font-size: 14px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; flex-shrink: 0; }
    .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
    .tab-edit-wrap { display: flex; align-items: center; gap: 3px; flex-shrink: 0; margin-left: 4px; }
    .tab-rename-input { font-size: 13px; padding: 3px 7px; border-radius: 6px; border: 1px solid #bbb; background: #fff; direction: rtl; }
    .tab-del-btn { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; background: none; cursor: pointer; color: #999; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .tab-del-btn:hover { background: #fee2e2; color: #b91c1c; }
    .add-tab-btn { padding: 5px 10px; border-radius: 6px; border: 1px dashed #bbb; font-size: 12px; cursor: pointer; background: none; color: #888; flex-shrink: 0; margin-right: 4px; }
    .add-tab-btn:hover { background: #f0efe9; }
    .item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid #e0ddd6; margin-bottom: 6px; background: #fff; }
    .item.green { background: #f0fdf4; border-color: #86efac; }
    .item.red   { background: #fff5f5; border-color: #fca5a5; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.red   { background: #ef4444; }
    .item-name { font-size: 14px; flex: 1; min-width: 0; }
    .assignee-select { font-size: 13px; padding: 3px 6px; border-radius: 6px; border: 1px solid #ccc; background: #fff; color: #555; cursor: pointer; direction: rtl; max-width: 130px; flex-shrink: 0; }
    .assignee-select.assigned { border-color: #86efac; background: #f0fdf4; color: #166534; font-weight: 500; }
    .del-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #ddd; background: none; cursor: pointer; color: #999; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .del-btn:hover { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
    .add-row { display: flex; gap: 8px; margin-top: 8px; }
    .add-row input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; direction: rtl; }
    .add-row button { padding: 8px 16px; border-radius: 8px; border: 1px solid #ccc; font-size: 13px; cursor: pointer; background: #f5f4f0; white-space: nowrap; }
    .add-row button:hover { background: #e8e6e0; }
    .notice { font-size: 12px; color: #666; background: #f5f4f0; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; }
    .participants-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .p-chip { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 999px; background: #fff; border: 1px solid #e0ddd6; font-size: 14px; }
    .user-add-row { display: flex; gap: 8px; margin-top: 12px; }
    .user-add-row input { flex: 1; padding: 7px 12px; border-radius: 999px; border: 1px solid #ccc; font-size: 13px; direction: rtl; }
    .user-add-row button { padding: 6px 16px; border-radius: 999px; border: 1px solid #ccc; font-size: 13px; cursor: pointer; background: #f5f4f0; }
    .reset-section { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #e0ddd6; }
    .reset-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid #fca5a5; font-size: 13px; cursor: pointer; background: none; color: #b91c1c; }
    .reset-btn:hover { background: #fee2e2; }
    .saving { position: fixed; bottom: 16px; left: 16px; font-size: 12px; color: #888; background: #fff; border: 1px solid #e0ddd6; border-radius: 999px; padding: 4px 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .saving.show { opacity: 1; }
  </style>
</head>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBfGbeAmbJTic4p8oeeaF3kjhh20U7pvd0",
    authDomain: "camping-f03e6.firebaseapp.com",
    databaseURL: "https://camping-f03e6-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "camping-f03e6",
    storageBucket: "camping-f03e6.firebasestorage.app",
    messagingSenderId: "477196719253",
    appId: "1:477196719253:web:3341511eb05ae0246ab79c",
    measurementId: "G-EXX04SGVBZ"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._db = db; window._ref = ref; window._set = set;
  window._onValue = onValue; window._get = get;
  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));
</script>

<div class="app">
  <div class="header">
    <div>
      <h1>⛺ קמפינג היורשים</h1>
      <p id="headerSub">סמן מי מביא כל פריט</p>
    </div>
    <button class="edit-btn" id="editBtn" onclick="toggleEdit()">עריכה</button>
  </div>
  <div class="stats"       id="stats"></div>
  <div class="tabs-wrapper" id="tabsWrapper"></div>
  <div id="content"></div>
</div>
<div class="saving" id="savingIndicator">שומר...</div>

<script>
/* ── defaults ─────────────────────────────────────────── */
const DEFAULT_USERS = ['גפן','אלעד','צמח','דור','דידי','דן','ירדן','מייקל','מתן',"ניר ג'קי",'נמש','סער','שנירו'];
const DEFAULT_TABS  = [
  { id:'shared',  label:'ציוד משותף',  type:'assignee' },
  { id:'family',  label:'ציוד משפחתי', type:'info' },
  { id:'super',   label:'קניות סופר',  type:'assignee' },
  { id:'butcher', label:'קניות אטליז', type:'assignee' },
  { id:'people',  label:'משתתפים',     type:'people' }
];
const DEFAULT_LISTS = {
  shared:  ['מנגל','פק"ל קפה + כוסות','עצים למדורה','שולחן מתקפל 1','שולחן מתקפל 2','צידנית','גזייה','מחבת','סיר גדול','מלקחיים','קרש חיתוך גדול'],
  family:  ['אוהל','מחצלת','מזרן / שק"ש','כיסא מתקפל לכל אחד','תיק רחצה','רמקול JBL לזיווג חבורתי','פנס - עדיף תאורת חירום ביתית','מטען נייד','נייר טואלט','מגבונים לחים','קרם הגנה','אלתוש','תיק עזרה ראשונה','כובע','כפכפים','גרביים'],
  super:   ['עגבניות','מלפפונים','פירות','שיפודים','לחמניות','פיתות','טחינה','חמוצים','זיתים','שמן','מלח','פלפל','פפריקה','שוקולד למריחה','חמאת בוטנים','חטיפים לילדים','חטיפים מלוחים','שישיות מים','שתייה קלה','ויטמינצ׳יק','בירות','ערק','כוסות חד"פ','צלחות חד"פ','סכום חד"פ','קשים','תבניות חד"פ','נייר כסף','נייר סופג','שקיות זבל גדולות','נוזל כלים','ספוג','גחלים למנגל','מדליקי פחמים','קרח'],
  butcher: ['פרגיות לילדים','קבבים','סטייקים'],
  people:  []
};
const PRESETS = { 'פק"ל קפה + כוסות':'נמש', 'עצים למדורה':'ירדן' };

/* ── state ────────────────────────────────────────────── */
let currentTab = 'shared';
let editMode   = false;
let data       = { users:[], tabs:[], lists:{}, checks:{} };
let saveTimer  = null;

/* ── firebase ─────────────────────────────────────────── */
function showSaving() {
  const el = document.getElementById('savingIndicator');
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove('show'), 1500);
}
async function saveData() {
  await window._set(window._ref(window._db, 'campingData'), data);
  showSaving();
}
async function loadData() {
  if (!window._firebaseReady)
    await new Promise(r => window.addEventListener('firebaseReady', r, { once:true }));
  const snap = await window._get(window._ref(window._db, 'campingData'));
  if (snap.exists()) {
    data = snap.val();
    data.checks = data.checks || {};
    data.lists  = data.lists  || JSON.parse(JSON.stringify(DEFAULT_LISTS));
    data.users  = data.users  || [...DEFAULT_USERS];
    data.tabs   = data.tabs   || DEFAULT_TABS.map(t => ({...t}));
  } else {
    data = {
      users:  [...DEFAULT_USERS],
      tabs:   DEFAULT_TABS.map(t => ({...t})),
      lists:  JSON.parse(JSON.stringify(DEFAULT_LISTS)),
      checks: {}
    };
    for (const [item,user] of Object.entries(PRESETS))
      data.checks['shared_'+item] = { user, ts:0 };
    await saveData();
  }
  window._onValue(window._ref(window._db, 'campingData'), s => {
    if (!s.exists()) return;
    data = s.val();
    data.checks = data.checks || {};
    data.tabs   = data.tabs   || DEFAULT_TABS.map(t => ({...t}));
    renderAll();
  });
}

/* ── helpers ──────────────────────────────────────────── */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;');
const getTab     = id  => (data.tabs||[]).find(t => t.id === id);
const tabItems   = id  => data.lists[id] || [];
const assignee   = (tid,item) => data.checks[tid+'_'+item]?.user || '';

/* ── render ───────────────────────────────────────────── */
function renderAll() { renderTabs(); renderStats(); renderContent(); }

function renderStats() {
  const assigneeTabs = (data.tabs||[]).filter(t => t.type==='assignee');
  let total=0, done=0;
  assigneeTabs.forEach(t => tabItems(t.id).forEach(i => { total++; if (assignee(t.id,i)) done++; }));
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${done}/${total}</div><div class="stat-label">פריטים מכוסים</div></div>
    <div class="stat"><div class="stat-num">${tabItems('family').length}</div><div class="stat-label">ציוד משפחתי</div></div>
    <div class="stat"><div class="stat-num">${data.users.length}</div><div class="stat-label">משתתפים</div></div>`;
}

function renderTabs() {
  let html = '';
  (data.tabs||[]).forEach(t => {
    if (editMode) {
      const w = Math.max(70, t.label.length*11+16);
      html += `<div class="tab-edit-wrap">
        <input class="tab-rename-input" value="${esc(t.label)}" style="width:${w}px"
          onchange="renameTab('${t.id}',this.value)">
        <button class="tab-del-btn" onclick="delTab('${t.id}')">×</button>
      </div>`;
    } else {
      html += `<button class="tab${currentTab===t.id?' active':''}" onclick="switchTab('${t.id}')">${esc(t.label)}</button>`;
    }
  });
  if (editMode) html += `<button class="add-tab-btn" onclick="addTab()">+ טאב</button>`;
  document.getElementById('tabsWrapper').innerHTML = html;
}

function renderContent() {
  const el  = document.getElementById('content');
  const tab = getTab(currentTab);
  if (!tab) { el.innerHTML=''; return; }
  if (tab.type==='people')   { renderPeopleTab(el); return; }
  if (tab.type==='info')     { renderInfoTab(el, tab); return; }
  renderAssigneeTab(el, tab);
}

function renderPeopleTab(el) {
  const chips = data.users.map(u =>
    `<div class="p-chip">${esc(u)}${editMode?`<button class="del-btn" onclick="delUser('${esc(u)}')">×</button>`:''}</div>`
  ).join('');
  const add   = editMode ? `<div class="user-add-row"><input id="newUserInput" placeholder="שם חדש..." onkeydown="if(event.key==='Enter')addUser()"><button onclick="addUser()">+ הוסף</button></div>` : '';
  const reset = editMode ? `<div class="reset-section"><button class="reset-btn" onclick="resetChecks()">איפוס כל הסימונים לקמפינג חדש</button></div>` : '';
  el.innerHTML = `<div class="participants-grid">${chips}</div>${add}${reset}`;
}

function renderInfoTab(el, tab) {
  const rows = tabItems(tab.id).map(item =>
    `<div class="item"><span class="item-name">${esc(item)}</span>${editMode?`<button class="del-btn" onclick="delItem('${tab.id}','${esc(item)}')">×</button>`:''}</div>`
  ).join('');
  const add = editMode ? addRowHTML(tab.id) : '';
  el.innerHTML = `<div class="notice">רשימת המלצות גורפת — ציוד שכדאי שכל משפחה תביא</div>${rows}${add}`;
}

function renderAssigneeTab(el, tab) {
  const opts = data.users.map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('');
  const rows = tabItems(tab.id).map(item => {
    const asgn  = assignee(tab.id, item);
    const color = asgn ? 'green' : 'red';
    const sel   = !editMode
      ? `<select class="assignee-select${asgn?' assigned':''}"
           data-tab="${tab.id}" data-item="${esc(item)}"
           onchange="setAssignee(this)" onclick="event.stopPropagation()">
           <option value="">— לא שויך —</option>${opts}
         </select>`
      : '';
    const del = editMode ? `<button class="del-btn" onclick="delItem('${tab.id}','${esc(item)}')">×</button>` : '';
    return `<div class="item ${color}" id="row_${tab.id}_${esc(item)}">
      <div class="dot ${color}"></div>
      <span class="item-name">${esc(item)}</span>
      ${sel}${del}
    </div>`;
  }).join('');
  el.innerHTML = rows + (editMode ? addRowHTML(tab.id) : '');
  // set dropdown values after render
  if (!editMode) {
    el.querySelectorAll('.assignee-select').forEach(sel => {
      sel.value = assignee(sel.dataset.tab, sel.dataset.item);
    });
  }
}

function addRowHTML(tid) {
  return `<div class="add-row"><input id="newItemInput_${tid}" placeholder="הוסף פריט..." onkeydown="if(event.key==='Enter')addItem('${tid}')"><button onclick="addItem('${tid}')">הוסף</button></div>`;
}

/* ── actions ──────────────────────────────────────────── */
async function setAssignee(sel) {
  const { tab, item } = sel.dataset;
  const val = sel.value;
  const k   = tab + '_' + item;
  if (val) { data.checks[k] = { user:val, ts:Date.now() }; }
  else     { delete data.checks[k]; }
  await saveData();
  renderStats();
  // update row color without full re-render
  const row = sel.closest('.item');
  const dot = row.querySelector('.dot');
  const color = val ? 'green' : 'red';
  row.className = 'item ' + color;
  dot.className = 'dot '  + color;
  sel.className = 'assignee-select' + (val ? ' assigned' : '');
}

function switchTab(id) { currentTab=id; renderTabs(); renderContent(); }

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('editBtn').classList.toggle('active', editMode);
  document.getElementById('editBtn').textContent = editMode ? 'סיום עריכה' : 'עריכה';
  document.getElementById('headerSub').textContent = editMode
    ? 'מצב עריכה — ניתן לערוך הכל'
    : 'סמן מי מביא כל פריט';
  renderAll();
}

async function addUser() {
  const inp = document.getElementById('newUserInput');
  const v   = inp.value.trim();
  if (!v || data.users.includes(v)) return;
  data.users.push(v); inp.value='';
  await saveData(); renderPeopleTab(document.getElementById('content'));
}
async function delUser(u) {
  if (!confirm('למחוק את '+u+'?')) return;
  data.users = data.users.filter(x=>x!==u);
  for (const k of Object.keys(data.checks))
    if (data.checks[k]?.user===u) delete data.checks[k];
  await saveData(); renderAll();
}

async function addItem(tid) {
  const inp = document.getElementById('newItemInput_'+tid);
  if (!inp) return;
  const v = inp.value.trim();
  if (!v) return;
  if (!data.lists[tid]) data.lists[tid]=[];
  if (data.lists[tid].includes(v)) return;
  data.lists[tid].push(v); inp.value='';
  await saveData(); renderContent(); renderStats();
}
async function delItem(tid, item) {
  data.lists[tid] = (data.lists[tid]||[]).filter(x=>x!==item);
  delete data.checks[tid+'_'+item];
  await saveData(); renderContent(); renderStats();
}

async function addTab() {
  const label = prompt('שם הטאב החדש:');
  if (!label) return;
  const id = 'tab_'+Date.now();
  data.tabs.push({ id, label, type:'assignee' });
  data.lists[id] = [];
  currentTab = id;
  await saveData(); renderAll();
}
async function delTab(id) {
  if (!confirm('למחוק את הטאב?')) return;
  data.tabs = data.tabs.filter(t=>t.id!==id);
  delete data.lists[id];
  for (const k of Object.keys(data.checks))
    if (k.startsWith(id+'_')) delete data.checks[k];
  if (currentTab===id) currentTab = data.tabs[0]?.id||'shared';
  await saveData(); renderAll();
}
async function renameTab(id, newLabel) {
  const t = getTab(id); if (t) t.label=newLabel;
  await saveData(); renderTabs();
}
async function resetChecks() {
  if (!confirm('לאפס את כל הסימונים לקמפינג חדש?')) return;
  data.checks={};
  await saveData(); renderAll();
}

/* ── expose globals ───────────────────────────────────── */
Object.assign(window, { setAssignee, switchTab, toggleEdit, addUser, delUser,
  addItem, delItem, addTab, delTab, renameTab, resetChecks });

loadData().then(renderAll);
</script>
</body>
</html>
